name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download release tarball
        run: gh release download "${{ github.event.release.tag_name }}" --pattern "*.tgz"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish canary
        if: github.event.release.prerelease
        run: pnpm publish *.tgz --provenance --access public --no-git-checks --tag canary

      - name: Publish latest
        if: "!github.event.release.prerelease"
        run: pnpm publish *.tgz --provenance --access public --no-git-checks
